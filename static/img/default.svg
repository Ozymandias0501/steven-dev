<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#00FF88;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="#00FF88" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- Border -->
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#00FF88" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Icon -->
  <g transform="translate(400, 190)">
    <rect x="-40" y="-30" width="80" height="65" rx="4" fill="none" stroke="#00FF88" stroke-opacity="0.3" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="12" fill="none" stroke="#00FF88" stroke-opacity="0.3" stroke-width="1.5"/>
    <polyline points="-40,35 -15,10 5,25 25,5 40,35" fill="none" stroke="#00FF88" stroke-opacity="0.3" stroke-width="1.5"/>
  </g>
  <!-- Text -->
  <text x="400" y="300" text-anchor="middle" font-family="monospace" font-size="13" fill="#00FF88" fill-opacity="0.4" letter-spacing="4">SIN IMAGEN</text>
  <text x="400" y="320" text-anchor="middle" font-family="monospace" font-size="10" fill="#444444" letter-spacing="2">NEXUS.SERVICES</text>
</svg>
